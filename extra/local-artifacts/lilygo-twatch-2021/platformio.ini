[env:ttgo-t-watch]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = default.csv

lib_deps =
  bblanchon/ArduinoJson@^7.1.0
  Xinyuan-LilyGO/TTGO TWatch Library@^1.4.0

build_flags =
  -DCORE_DEBUG_LEVEL=3

; Nota: la board reale del T-Watch varia per revisione.
; Questa base e' pronta per partire su ESP32 e rifinire pin/periferiche in seguito.
