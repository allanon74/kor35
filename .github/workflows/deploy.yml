name: Safe Release Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref da deployare (branch, tag o SHA)"
        required: false
        default: "main"
      run_migrations:
        description: "Eseguire migrate su production/mirror"
        required: true
        default: true
        type: boolean
      force_frontend_build:
        description: "Forza build npm + rsync statici anche senza commit in frontend/ (recupero react_build)"
        required: false
        default: false
        type: boolean

concurrency:
  group: safe-release-${{ github.ref }}
  cancel-in-progress: false

# Transizione monorepo (sostituisce i vecchi deploy: kor35 su Apache/venv + kor35-app frontend separato).
# - Build frontend solo su GitHub; rsync della dist verso .../nginx-docker/react_build (prod e mirror).
# - Produzione: compose.base + compose.prod; mirror: compose.base + compose.mirror (include Omada).
# - NON usare `docker compose down -v` sul Pi: i volumi sotto nginx-docker/omada_* e postgres_data sono persistenti.

jobs:
  guard-main-ref:
    name: Guard main-only deploy ref
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy ref is main
        run: |
          set -euo pipefail
          REF_INPUT="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || 'main' }}"
          if [ "${REF_INPUT}" != "main" ]; then
            echo "Deploy bloccato: consentito solo ref=main. Ricevuto: ${REF_INPUT}" >&2
            exit 1
          fi
          echo "Deploy ref valido: ${REF_INPUT}"

  # Build React su runner GitHub (niente npm sul server): solo se frontend/ è cambiato.
  build-frontend:
    name: Build frontend (if frontend/ changed)
    runs-on: ubuntu-latest
    needs: [guard-main-ref]
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Rileva modifiche in frontend/
        id: detect
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_frontend_build }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Frontend: build forzata (workflow_dispatch force_frontend_build)."
            exit 0
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
          else
            REF_INPUT="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || 'main' }}"
            git fetch origin "${REF_INPUT}"
            git checkout "${REF_INPUT}"
            AFTER="$(git rev-parse HEAD)"
            BEFORE="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi
          if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Frontend: nessun before affidabile — eseguo build."
            exit 0
          fi
          if git diff --name-only "$BEFORE" "$AFTER" -- frontend/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Frontend: modifiche tra ${BEFORE:0:8}..${AFTER:0:8}"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Frontend: nessun file modificato in frontend/"
          fi

      - name: Setup Node
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci && npm run build
        if: steps.detect.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          npm run build

      - name: Upload dist
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 3

  build-frontend-pilot:
    name: Build frontend pilota (if frontend-pilot/ changed)
    runs-on: ubuntu-latest
    needs: [guard-main-ref]
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Rileva modifiche in frontend-pilot/
        id: detect
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_frontend_build }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
          else
            REF_INPUT="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || 'main' }}"
            git fetch origin "${REF_INPUT}"
            git checkout "${REF_INPUT}"
            AFTER="$(git rev-parse HEAD)"
            BEFORE="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi
          if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "$AFTER" -- frontend-pilot/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm install && npm run build
        if: steps.detect.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cd frontend-pilot
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Upload dist (pilot)
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-pilot-dist
          path: frontend-pilot/dist
          retention-days: 3

  production-deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    needs: [guard-main-ref, build-frontend, build-frontend-pilot]
    steps:
      # Runner pulito: senza checkout i path extra/ota-artifacts/ non esistono (rsync OTA/APK farebbe sempre skip).
      # Checkout completo superficiale (no sparse): meno corner case rispetto a sparse-checkout sui runner.
      - name: Checkout repo (OTA/APK + coerenza ref deploy)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Download frontend dist
        if: needs.build-frontend.outputs.changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist-upload

      # PRIMA la dist Vite con --delete (altrimenti cancella watch-apps/ e watch-ota/ caricati prima).
      - name: Rsync frontend verso produzione
        if: needs.build-frontend.outputs.changed == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          PORT: ${{ secrets.SERVER_SSH_PORT }}
          PROJECT_PATH: ${{ secrets.SERVER_PROJECT_PATH }}
          PROD_COMPOSE_PROJECT_NAME: ${{ secrets.PROD_COMPOSE_PROJECT_NAME }}
        run: |
          set -euo pipefail
          REMOTE_BASE="${PROJECT_PATH:-/srv/kor35}"
          REMOTE="${REMOTE_BASE}/config/docker/nginx-docker/react_build"
          CPN="${PROD_COMPOSE_PROJECT_NAME:-kor35-prod}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          P="${PORT:-22}"
          SSH_OPTS="-p $P -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa"
          ssh-keyscan -p "$P" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          # I file sotto react_build possono essere root/nginx (volume Docker): rsync --delete fallisce senza chown.
          # Ferma nginx, poi chown uid:gid dell'utente deploy via container root (no sudo su host se l'utente ha docker).
          ssh $SSH_OPTS "${USER}@${HOST}" "bash -s" -- "$REMOTE_BASE" "$CPN" <<'REMOTE_PREP'
          set -euo pipefail
          REMOTE_BASE="${1:?}"
          CPN="${2:?}"
          RB="${REMOTE_BASE}/config/docker/nginx-docker/react_build"
          mkdir -p "$RB"
          cd "${REMOTE_BASE}/config/docker"
          export COMPOSE_PROJECT_NAME="${CPN}"
          docker compose -f compose.base.yml -f compose.prod.yml stop frontend 2>/dev/null || true
          # Se fallisce (es. pull Alpine bloccato), non bloccare il deploy: rsync come prima del fix permessi.
          if ! docker run --rm -v "${RB}:/mnt:rw" alpine:3.20 chown -R "$(id -u):$(id -g)" /mnt; then
            echo "WARN: chown react_build via docker fallito; continuo con rsync (può fallire se i file sono root)." >&2
          fi
          REMOTE_PREP
          rsync -avz --delete -e "ssh $SSH_OPTS" \
            dist-upload/ "${USER}@${HOST}:${REMOTE}/"

      - name: Rimuovi build console pilota da produzione
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          PORT: ${{ secrets.SERVER_SSH_PORT }}
          PROJECT_PATH: ${{ secrets.SERVER_PROJECT_PATH }}
        run: |
          set -euo pipefail
          REMOTE_BASE="${PROJECT_PATH:-/srv/kor35}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          P="${PORT:-22}"
          SSH_OPTS="-p $P -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa"
          ssh-keyscan -p "$P" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh $SSH_OPTS "${USER}@${HOST}" "rm -rf '${REMOTE_BASE}/config/docker/nginx-docker/react_build_pilot'"

      - name: Rsync firmware OTA verso produzione
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          PORT: ${{ secrets.SERVER_SSH_PORT }}
          PROJECT_PATH: ${{ secrets.SERVER_PROJECT_PATH }}
        run: |
          set -euo pipefail
          SRC="extra/ota-artifacts/lilygo-twatch-2021/firmware.bin"
          if [ ! -f "$SRC" ]; then
            echo "Firmware OTA non presente ($SRC): skip upload."
            exit 0
          fi
          REMOTE_BASE="${PROJECT_PATH:-/srv/kor35}"
          REMOTE_DIR="${REMOTE_BASE}/config/docker/nginx-docker/react_build/watch-ota/lilygo-twatch-2021"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          P="${PORT:-22}"
          SSH_OPTS="-p $P -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa"
          ssh-keyscan -p "$P" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh $SSH_OPTS "${USER}@${HOST}" "mkdir -p '${REMOTE_DIR}'"
          rsync -avz -e "ssh $SSH_OPTS" "$SRC" "${USER}@${HOST}:${REMOTE_DIR}/firmware.bin"

      - name: Rsync APK Wear OS verso produzione
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          PORT: ${{ secrets.SERVER_SSH_PORT }}
          PROJECT_PATH: ${{ secrets.SERVER_PROJECT_PATH }}
        run: |
          set -euo pipefail
          SRC="extra/ota-artifacts/wearos-kor35/app-release.apk"
          if [ ! -f "$SRC" ]; then
            echo "APK Wear OS non presente ($SRC): skip upload."
            exit 0
          fi
          REMOTE_BASE="${PROJECT_PATH:-/srv/kor35}"
          REMOTE_DIR="${REMOTE_BASE}/config/docker/nginx-docker/react_build/watch-apps/wearos-kor35"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          P="${PORT:-22}"
          SSH_OPTS="-p $P -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa"
          ssh-keyscan -p "$P" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh $SSH_OPTS "${USER}@${HOST}" "mkdir -p '${REMOTE_DIR}'"
          rsync -avz -e "ssh $SSH_OPTS" "$SRC" "${USER}@${HOST}:${REMOTE_DIR}/app-release.apk"

      - name: Backup and deploy on Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          command_timeout: 40m
          script: |
            set -euo pipefail
            REF="main"
            RUN_MIGRATIONS="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations || 'true' }}"
            PROJECT_PATH="${{ secrets.SERVER_PROJECT_PATH || '' }}"
            COMPOSE_PROJECT_NAME="${{ secrets.PROD_COMPOSE_PROJECT_NAME || 'kor35-prod' }}"
            HEALTHCHECK_URL="${{ secrets.PRODUCTION_HEALTHCHECK_URL || '' }}"

            if [ -z "${PROJECT_PATH}" ]; then
              PROJECT_PATH="/srv/kor35"
            fi
            if [ -z "${PROJECT_PATH}" ]; then
              echo "Path progetto production non trovato. Imposta secret SERVER_PROJECT_PATH con il path completo (es. /home/<user>/progetti/kor35)." >&2
              exit 1
            fi
            if [ ! -d "${PROJECT_PATH}" ]; then
              echo "SERVER_PROJECT_PATH non esiste: ${PROJECT_PATH}" >&2
              exit 1
            fi
            if [ ! -f "${PROJECT_PATH}/config/docker/compose.base.yml" ]; then
              echo "Monorepo docker non rilevato in ${PROJECT_PATH} (manca config/docker/compose.base.yml)." >&2
              exit 1
            fi

            cd "${PROJECT_PATH}"
            git fetch --all --tags
            PREVIOUS_SHA="$(git rev-parse HEAD)"
            echo "PREVIOUS_SHA=${PREVIOUS_SHA}"
            if git show-ref --verify --quiet "refs/remotes/origin/${REF}"; then
              git checkout -B "${REF}" "origin/${REF}"
              git reset --hard "origin/${REF}"
            else
              git checkout "${REF}"
              git reset --hard "${REF}"
            fi
            DEPLOYED_SHA="$(git rev-parse HEAD)"
            # Cartelle firmware/app locali utili in repo (GitHub) ma non da tenere sul server.
            rm -rf "${PROJECT_PATH}/extra/local-artifacts" "${PROJECT_PATH}/extra/ota-artifacts"
            export KOR35_BUILD_SHA="${DEPLOYED_SHA}"
            export KOR35_BUILD_VERSION="g$(git rev-parse --short HEAD)"
            export KOR35_BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "DEPLOYED_SHA=${DEPLOYED_SHA}"

            export KOR35_BACKEND_ENV_FILE="${PROJECT_PATH}/backend/.env.prod"
            if [ ! -f "${KOR35_BACKEND_ENV_FILE}" ]; then
              echo "File env production mancante: ${KOR35_BACKEND_ENV_FILE}" >&2
              exit 1
            fi

            cd "${PROJECT_PATH}/config/docker"
            export COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME}"
            # Guard rail: pulizia preventiva contro container orfani con nome fisso
            # (es. kor35_prod_redis) creati da run manuali precedenti.
            docker compose -f compose.base.yml -f compose.prod.yml down --remove-orphans || true
            for cname in kor35_prod_db kor35_prod_redis kor35_prod_backend kor35_prod_daphne kor35_prod_frontend; do
              if docker ps -a --format '{{.Names}}' | grep -Fxq "${cname}"; then
                echo "Rimuovo container orfano in conflitto: ${cname}"
                docker rm -f "${cname}" || true
              fi
            done
            docker compose -f compose.base.yml -f compose.prod.yml up -d --build

            if [ "${RUN_MIGRATIONS}" = "true" ]; then
              docker compose -f compose.base.yml -f compose.prod.yml exec -T backend python manage.py migrate --noinput
            fi
            docker compose -f compose.base.yml -f compose.prod.yml exec -T backend python manage.py check --deploy
            docker compose -f compose.base.yml -f compose.prod.yml exec -T backend python manage.py collectstatic --noinput
            docker compose -f compose.base.yml -f compose.prod.yml exec -T frontend nginx -s reload 2>/dev/null || true
            docker compose -f compose.base.yml -f compose.prod.yml ps

            if [ -n "${HEALTHCHECK_URL}" ]; then
              curl -fsS "${HEALTHCHECK_URL}" >/dev/null
            fi
            echo "Production deploy OK"

  # Mirror = monorepo completo su ROOT_PATH (non più solo backend_src): stesso repo di produzione.
  # Omada (compose.mirror.yml) condivide il progetto compose: `up -d --build` aggiorna kor35_* senza toccare
  # i bind mount omada_data/omada_logs se i container Omada non vanno ricreati.
  mirror-deploy:
    name: Mirror Raspberry backend deploy
    runs-on: ubuntu-latest
    needs: [production-deploy, build-frontend, build-frontend-pilot]
    steps:
      - name: Checkout repo (OTA/APK + coerenza ref deploy)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Download frontend dist
        if: needs.build-frontend.outputs.changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist-upload

      - name: Download frontend pilota dist
        if: needs.build-frontend-pilot.outputs.changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-pilot-dist
          path: dist-upload-pilot

      - name: Rsync frontend verso mirror
        if: needs.build-frontend.outputs.changed == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.MIRROR_SERVER_SSH_KEY }}
          HOST: ${{ secrets.MIRROR_SERVER_HOST }}
          USER: ${{ secrets.MIRROR_SERVER_USER }}
          PORT: ${{ secrets.MIRROR_SERVER_SSH_PORT }}
          ROOT_PATH: ${{ secrets.MIRROR_ROOT_PATH }}
          BACKEND_PATH: ${{ secrets.MIRROR_BACKEND_PATH }}
          MIRROR_COMPOSE_PROJECT_NAME: ${{ secrets.MIRROR_COMPOSE_PROJECT_NAME }}
        run: |
          set -euo pipefail
          if [ ! -f dist-upload/index.html ]; then
            echo "Artifact frontend-dist mancante o vuoto (manca dist-upload/index.html)." >&2
            exit 1
          fi
          # Stessa logica dello step SSH: root monorepo = MIRROR_ROOT_PATH se valorizzato, altrimenti MIRROR_BACKEND_PATH, altrimenti default.
          REMOTE_BASE="${ROOT_PATH:-${BACKEND_PATH:-/home/pi/kor35-replica}}"
          REMOTE="${REMOTE_BASE}/config/docker/nginx-docker/react_build"
          CPN="${MIRROR_COMPOSE_PROJECT_NAME:-kor35-replica}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          P="${PORT:-22}"
          SSH_OPTS="-p $P -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa"
          ssh-keyscan -p "$P" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh $SSH_OPTS "${USER}@${HOST}" "test -f '${REMOTE_BASE}/config/docker/compose.base.yml'" || {
            echo "Path mirror errato: ${REMOTE_BASE} (manca config/docker/compose.base.yml)." >&2
            echo "Allinea i secret MIRROR_ROOT_PATH e MIRROR_BACKEND_PATH alla root del monorepo (es. /home/pi/kor35-replica)." >&2
            exit 1
          }
          ssh $SSH_OPTS "${USER}@${HOST}" "bash -s" -- "$REMOTE_BASE" "$CPN" <<'REMOTE_PREP'
          set -euo pipefail
          REMOTE_BASE="${1:?}"
          CPN="${2:?}"
          RB="${REMOTE_BASE}/config/docker/nginx-docker/react_build"
          mkdir -p "$RB"
          cd "${REMOTE_BASE}/config/docker"
          export COMPOSE_PROJECT_NAME="${CPN}"
          docker compose -f compose.base.yml -f compose.mirror.yml stop frontend 2>/dev/null || true
          if ! docker run --rm -v "${RB}:/mnt:rw" alpine:3.20 chown -R "$(id -u):$(id -g)" /mnt; then
            echo "ERRORE: chown react_build via docker fallito." >&2
            echo "Sul Pi esegui: cd ${REMOTE_BASE} && ./scripts/fix_react_build_permissions.sh ${REMOTE_BASE} mirror" >&2
            exit 1
          fi
          if ! touch "${RB}/.ci_write_test" 2>/dev/null; then
            echo "ERRORE: ${RB} non scrivibile dall'utente SSH dopo chown." >&2
            exit 1
          fi
          rm -f "${RB}/.ci_write_test"
          REMOTE_PREP
          rsync -avz --delete -e "ssh $SSH_OPTS" \
            dist-upload/ "${USER}@${HOST}:${REMOTE}/"

      - name: Rsync console pilota verso mirror
        if: needs.build-frontend-pilot.outputs.changed == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.MIRROR_SERVER_SSH_KEY }}
          HOST: ${{ secrets.MIRROR_SERVER_HOST }}
          USER: ${{ secrets.MIRROR_SERVER_USER }}
          PORT: ${{ secrets.MIRROR_SERVER_SSH_PORT }}
          ROOT_PATH: ${{ secrets.MIRROR_ROOT_PATH }}
          BACKEND_PATH: ${{ secrets.MIRROR_BACKEND_PATH }}
          MIRROR_COMPOSE_PROJECT_NAME: ${{ secrets.MIRROR_COMPOSE_PROJECT_NAME }}
        run: |
          set -euo pipefail
          REMOTE_BASE="${ROOT_PATH:-${BACKEND_PATH:-/home/pi/kor35-replica}}"
          REMOTE="${REMOTE_BASE}/config/docker/nginx-docker/react_build_pilot"
          CPN="${MIRROR_COMPOSE_PROJECT_NAME:-kor35-replica}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          P="${PORT:-22}"
          SSH_OPTS="-p $P -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa"
          ssh-keyscan -p "$P" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh $SSH_OPTS "${USER}@${HOST}" "bash -s" -- "$REMOTE_BASE" "$CPN" <<'REMOTE_PREP'
          set -euo pipefail
          REMOTE_BASE="${1:?}"
          CPN="${2:?}"
          RB="${REMOTE_BASE}/config/docker/nginx-docker/react_build_pilot"
          mkdir -p "$RB"
          cd "${REMOTE_BASE}/config/docker"
          export COMPOSE_PROJECT_NAME="${CPN}"
          if ! docker run --rm -v "${RB}:/mnt:rw" alpine:3.20 chown -R "$(id -u):$(id -g)" /mnt; then
            echo "WARN: chown react_build_pilot via docker fallito; continuo." >&2
          fi
          REMOTE_PREP
          rsync -avz --delete -e "ssh $SSH_OPTS" \
            dist-upload-pilot/ "${USER}@${HOST}:${REMOTE}/"

      - name: Rsync firmware OTA verso mirror
        env:
          SSH_PRIVATE_KEY: ${{ secrets.MIRROR_SERVER_SSH_KEY }}
          HOST: ${{ secrets.MIRROR_SERVER_HOST }}
          USER: ${{ secrets.MIRROR_SERVER_USER }}
          PORT: ${{ secrets.MIRROR_SERVER_SSH_PORT }}
          ROOT_PATH: ${{ secrets.MIRROR_ROOT_PATH }}
          BACKEND_PATH: ${{ secrets.MIRROR_BACKEND_PATH }}
        run: |
          set -euo pipefail
          SRC="extra/ota-artifacts/lilygo-twatch-2021/firmware.bin"
          if [ ! -f "$SRC" ]; then
            echo "Firmware OTA non presente ($SRC): skip upload mirror."
            exit 0
          fi
          REMOTE_BASE="${ROOT_PATH:-${BACKEND_PATH:-/home/pi/kor35-replica}}"
          REMOTE_DIR="${REMOTE_BASE}/config/docker/nginx-docker/react_build/watch-ota/lilygo-twatch-2021"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          P="${PORT:-22}"
          SSH_OPTS="-p $P -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa"
          ssh-keyscan -p "$P" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh $SSH_OPTS "${USER}@${HOST}" "mkdir -p '${REMOTE_DIR}'"
          rsync -avz -e "ssh $SSH_OPTS" "$SRC" "${USER}@${HOST}:${REMOTE_DIR}/firmware.bin"

      - name: Rsync APK Wear OS verso mirror
        env:
          SSH_PRIVATE_KEY: ${{ secrets.MIRROR_SERVER_SSH_KEY }}
          HOST: ${{ secrets.MIRROR_SERVER_HOST }}
          USER: ${{ secrets.MIRROR_SERVER_USER }}
          PORT: ${{ secrets.MIRROR_SERVER_SSH_PORT }}
          ROOT_PATH: ${{ secrets.MIRROR_ROOT_PATH }}
          BACKEND_PATH: ${{ secrets.MIRROR_BACKEND_PATH }}
        run: |
          set -euo pipefail
          SRC="extra/ota-artifacts/wearos-kor35/app-release.apk"
          if [ ! -f "$SRC" ]; then
            echo "APK Wear OS non presente ($SRC): skip upload mirror."
            exit 0
          fi
          REMOTE_BASE="${ROOT_PATH:-${BACKEND_PATH:-/home/pi/kor35-replica}}"
          REMOTE_DIR="${REMOTE_BASE}/config/docker/nginx-docker/react_build/watch-apps/wearos-kor35"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          P="${PORT:-22}"
          SSH_OPTS="-p $P -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa"
          ssh-keyscan -p "$P" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh $SSH_OPTS "${USER}@${HOST}" "mkdir -p '${REMOTE_DIR}'"
          rsync -avz -e "ssh $SSH_OPTS" "$SRC" "${USER}@${HOST}:${REMOTE_DIR}/app-release.apk"

      - name: Deploy backend to mirror via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MIRROR_SERVER_HOST }}
          username: ${{ secrets.MIRROR_SERVER_USER }}
          key: ${{ secrets.MIRROR_SERVER_SSH_KEY }}
          port: ${{ secrets.MIRROR_SERVER_SSH_PORT || 10022 }}
          script: |
            set -euo pipefail
            REF="main"
            ROOT_PATH="${{ secrets.MIRROR_ROOT_PATH || '/home/pi/kor35-replica' }}"
            MIRROR_REPO_PATH="${{ secrets.MIRROR_BACKEND_PATH || '/home/pi/kor35-replica' }}"
            MIRROR_REPO_URL="${{ secrets.MIRROR_BACKEND_REPO_URL || '' }}"
            COMPOSE_PROJECT_NAME="${{ secrets.MIRROR_COMPOSE_PROJECT_NAME || 'kor35-replica' }}"
            HEALTHCHECK_URL="${{ secrets.MIRROR_HEALTHCHECK_URL || '' }}"
            RUN_MIGRATIONS="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations || 'true' }}"

            if [ -d "${ROOT_PATH}" ]; then
              MIRROR_REPO_PATH="${ROOT_PATH}"
            fi

            if [ ! -d "${MIRROR_REPO_PATH}" ]; then
              if [ -n "${MIRROR_REPO_URL}" ]; then
                mkdir -p "$(dirname "${MIRROR_REPO_PATH}")"
                git clone "${MIRROR_REPO_URL}" "${MIRROR_REPO_PATH}"
              else
                echo "Repo mirror non trovato: ${MIRROR_REPO_PATH}. Imposta MIRROR_ROOT_PATH/MIRROR_BACKEND_PATH oppure MIRROR_BACKEND_REPO_URL." >&2
                exit 1
              fi
            fi

            cd "${MIRROR_REPO_PATH}"
            git fetch --all --tags
            if git show-ref --verify --quiet "refs/remotes/origin/${REF}"; then
              git checkout -B "${REF}" "origin/${REF}"
              git reset --hard "origin/${REF}"
            else
              git checkout "${REF}"
              git reset --hard "${REF}"
            fi
            MIRROR_BACKEND_DEPLOYED_SHA="$(git rev-parse HEAD)"
            # Cartelle firmware/app locali utili in repo (GitHub) ma non da tenere sul mirror.
            rm -rf "${MIRROR_REPO_PATH}/extra/local-artifacts" "${MIRROR_REPO_PATH}/extra/ota-artifacts"
            export KOR35_BUILD_SHA="${MIRROR_BACKEND_DEPLOYED_SHA}"
            export KOR35_BUILD_VERSION="g$(git rev-parse --short HEAD)"
            export KOR35_BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "MIRROR_BACKEND_DEPLOYED_SHA=${MIRROR_BACKEND_DEPLOYED_SHA}"

            if [ ! -f "config/docker/compose.base.yml" ]; then
              echo "Monorepo docker non rilevato su mirror (manca config/docker/compose.base.yml)." >&2
              exit 1
            fi

            export KOR35_BACKEND_ENV_FILE="${MIRROR_REPO_PATH}/backend/.env.mirror"
            if [ ! -f "${KOR35_BACKEND_ENV_FILE}" ]; then
              echo "File env mirror mancante: ${KOR35_BACKEND_ENV_FILE}" >&2
              exit 1
            fi

            # Abilita vhost DDNS solo su mirror (kor35.ddns.net):
            # ddns.conf è escluso dalla produzione e viene derivato dal template versionato.
            if [ -f "${MIRROR_REPO_PATH}/config/docker/nginx-docker/nginx_conf/ddns.conf.example" ]; then
              cp -f \
                "${MIRROR_REPO_PATH}/config/docker/nginx-docker/nginx_conf/ddns.conf.example" \
                "${MIRROR_REPO_PATH}/config/docker/nginx-docker/nginx_conf/ddns.conf"
            fi

            cd "${MIRROR_REPO_PATH}/config/docker"
            export COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME}"
            # Guard rail: pulizia preventiva contro container orfani con nome fisso
            # (es. omada_controller o kor35_mirror_*) creati da run manuali precedenti.
            docker compose -f compose.base.yml -f compose.mirror.yml down --remove-orphans || true
            for cname in omada_controller kor35_mirror_db kor35_mirror_redis kor35_mirror_backend kor35_mirror_daphne kor35_mirror_frontend; do
              if docker ps -a --format '{{.Names}}' | grep -Fxq "${cname}"; then
                echo "Rimuovo container orfano in conflitto: ${cname}"
                docker rm -f "${cname}" || true
              fi
            done
            docker compose -f compose.base.yml -f compose.mirror.yml up -d --build
            if [ "${RUN_MIGRATIONS}" = "true" ]; then
              docker compose -f compose.base.yml -f compose.mirror.yml exec -T backend python manage.py migrate --noinput
            fi
            docker compose -f compose.base.yml -f compose.mirror.yml exec -T backend python manage.py collectstatic --noinput

            docker compose -f compose.base.yml -f compose.mirror.yml exec -T frontend nginx -s reload 2>/dev/null || true

            if [ -n "${HEALTHCHECK_URL}" ]; then
              curl -fsS "${HEALTHCHECK_URL}" >/dev/null
            fi
            echo "Mirror deploy OK"
