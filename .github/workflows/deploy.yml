name: Safe Release Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref da deployare (branch, tag o SHA)"
        required: false
        default: "main"
      run_migrations:
        description: "Eseguire migrate su production/mirror"
        required: true
        default: true
        type: boolean

concurrency:
  group: safe-release-${{ github.ref }}
  cancel-in-progress: false

# Transizione monorepo (sostituisce i vecchi deploy: kor35 su Apache/venv + kor35-app frontend separato).
# - Build frontend solo su GitHub; rsync della dist verso .../nginx-docker/react_build (prod e mirror).
# - Produzione: compose.base + compose.prod; mirror: compose.base + compose.mirror (include Omada).
# - NON usare `docker compose down -v` sul Pi: i volumi sotto nginx-docker/omada_* e postgres_data sono persistenti.

jobs:
  guard-main-ref:
    name: Guard main-only deploy ref
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy ref is main
        run: |
          set -euo pipefail
          REF_INPUT="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || 'main' }}"
          if [ "${REF_INPUT}" != "main" ]; then
            echo "Deploy bloccato: consentito solo ref=main. Ricevuto: ${REF_INPUT}" >&2
            exit 1
          fi
          echo "Deploy ref valido: ${REF_INPUT}"

  # Build React su runner GitHub (niente npm sul server): solo se frontend/ è cambiato.
  build-frontend:
    name: Build frontend (if frontend/ changed)
    runs-on: ubuntu-latest
    needs: [guard-main-ref]
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Rileva modifiche in frontend/
        id: detect
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
          else
            REF_INPUT="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || 'main' }}"
            git fetch origin "${REF_INPUT}"
            git checkout "${REF_INPUT}"
            AFTER="$(git rev-parse HEAD)"
            BEFORE="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi
          if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Frontend: nessun before affidabile — eseguo build."
            exit 0
          fi
          if git diff --name-only "$BEFORE" "$AFTER" -- frontend/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Frontend: modifiche tra ${BEFORE:0:8}..${AFTER:0:8}"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Frontend: nessun file modificato in frontend/"
          fi

      - name: Setup Node
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci && npm run build
        if: steps.detect.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          npm run build

      - name: Upload dist
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 3

  production-deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    needs: [guard-main-ref, build-frontend]
    steps:
      - name: Download frontend dist
        if: needs.build-frontend.outputs.changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist-upload

      - name: Rsync frontend verso produzione
        if: needs.build-frontend.outputs.changed == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          PORT: ${{ secrets.SERVER_SSH_PORT }}
          PROJECT_PATH: ${{ secrets.SERVER_PROJECT_PATH }}
        run: |
          set -euo pipefail
          REMOTE_BASE="${PROJECT_PATH:-/srv/kor35}"
          REMOTE="${REMOTE_BASE}/config/docker/nginx-docker/react_build"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          P="${PORT:-22}"
          ssh-keyscan -p "$P" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz --delete -e "ssh -p $P -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa" \
            dist-upload/ "${USER}@${HOST}:${REMOTE}/"

      - name: Backup and deploy on Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          command_timeout: 40m
          script: |
            set -euo pipefail
            REF="main"
            RUN_MIGRATIONS="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations || 'true' }}"
            PROJECT_PATH="${{ secrets.SERVER_PROJECT_PATH || '' }}"
            COMPOSE_PROJECT_NAME="${{ secrets.PROD_COMPOSE_PROJECT_NAME || 'kor35-prod' }}"
            HEALTHCHECK_URL="${{ secrets.PRODUCTION_HEALTHCHECK_URL || '' }}"

            if [ -z "${PROJECT_PATH}" ]; then
              PROJECT_PATH="/srv/kor35"
            fi
            if [ -z "${PROJECT_PATH}" ]; then
              echo "Path progetto production non trovato. Imposta secret SERVER_PROJECT_PATH con il path completo (es. /home/<user>/progetti/kor35)." >&2
              exit 1
            fi
            if [ ! -d "${PROJECT_PATH}" ]; then
              echo "SERVER_PROJECT_PATH non esiste: ${PROJECT_PATH}" >&2
              exit 1
            fi
            if [ ! -f "${PROJECT_PATH}/config/docker/compose.base.yml" ]; then
              echo "Monorepo docker non rilevato in ${PROJECT_PATH} (manca config/docker/compose.base.yml)." >&2
              exit 1
            fi

            cd "${PROJECT_PATH}"
            git fetch --all --tags
            PREVIOUS_SHA="$(git rev-parse HEAD)"
            echo "PREVIOUS_SHA=${PREVIOUS_SHA}"
            if git show-ref --verify --quiet "refs/remotes/origin/${REF}"; then
              git checkout -B "${REF}" "origin/${REF}"
              git reset --hard "origin/${REF}"
            else
              git checkout "${REF}"
              git reset --hard "${REF}"
            fi
            DEPLOYED_SHA="$(git rev-parse HEAD)"
            export KOR35_BUILD_SHA="${DEPLOYED_SHA}"
            export KOR35_BUILD_VERSION="g$(git rev-parse --short HEAD)"
            export KOR35_BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "DEPLOYED_SHA=${DEPLOYED_SHA}"

            export KOR35_BACKEND_ENV_FILE="${PROJECT_PATH}/backend/.env.prod"
            if [ ! -f "${KOR35_BACKEND_ENV_FILE}" ]; then
              echo "File env production mancante: ${KOR35_BACKEND_ENV_FILE}" >&2
              exit 1
            fi

            cd "${PROJECT_PATH}/config/docker"
            export COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME}"
            # Guard rail: pulizia preventiva contro container orfani con nome fisso
            # (es. kor35_prod_redis) creati da run manuali precedenti.
            docker compose -f compose.base.yml -f compose.prod.yml down --remove-orphans || true
            for cname in kor35_prod_db kor35_prod_redis kor35_prod_backend kor35_prod_daphne kor35_prod_frontend; do
              if docker ps -a --format '{{.Names}}' | grep -Fxq "${cname}"; then
                echo "Rimuovo container orfano in conflitto: ${cname}"
                docker rm -f "${cname}" || true
              fi
            done
            docker compose -f compose.base.yml -f compose.prod.yml up -d --build

            if [ "${RUN_MIGRATIONS}" = "true" ]; then
              docker compose -f compose.base.yml -f compose.prod.yml exec -T backend python manage.py migrate --noinput
            fi
            docker compose -f compose.base.yml -f compose.prod.yml exec -T backend python manage.py check --deploy
            docker compose -f compose.base.yml -f compose.prod.yml exec -T backend python manage.py collectstatic --noinput
            docker compose -f compose.base.yml -f compose.prod.yml ps

            if [ -n "${HEALTHCHECK_URL}" ]; then
              curl -fsS "${HEALTHCHECK_URL}" >/dev/null
            fi
            echo "Production deploy OK"

  # Mirror = monorepo completo su ROOT_PATH (non più solo backend_src): stesso repo di produzione.
  # Omada (compose.mirror.yml) condivide il progetto compose: `up -d --build` aggiorna kor35_* senza toccare
  # i bind mount omada_data/omada_logs se i container Omada non vanno ricreati.
  mirror-deploy:
    name: Mirror Raspberry backend deploy
    runs-on: ubuntu-latest
    needs: [production-deploy, build-frontend]
    steps:
      - name: Download frontend dist
        if: needs.build-frontend.outputs.changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist-upload

      - name: Rsync frontend verso mirror
        if: needs.build-frontend.outputs.changed == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.MIRROR_SERVER_SSH_KEY }}
          HOST: ${{ secrets.MIRROR_SERVER_HOST }}
          USER: ${{ secrets.MIRROR_SERVER_USER }}
          PORT: ${{ secrets.MIRROR_SERVER_SSH_PORT }}
          ROOT_PATH: ${{ secrets.MIRROR_ROOT_PATH }}
          BACKEND_PATH: ${{ secrets.MIRROR_BACKEND_PATH }}
        run: |
          set -euo pipefail
          # Stessa logica dello step SSH: root monorepo = MIRROR_ROOT_PATH se valorizzato, altrimenti MIRROR_BACKEND_PATH, altrimenti default.
          REMOTE_BASE="${ROOT_PATH:-${BACKEND_PATH:-/home/pi/kor35-replica}}"
          REMOTE="${REMOTE_BASE}/config/docker/nginx-docker/react_build"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          P="${PORT:-22}"
          ssh-keyscan -p "$P" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz --delete -e "ssh -p $P -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa" \
            dist-upload/ "${USER}@${HOST}:${REMOTE}/"

      - name: Deploy backend to mirror via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MIRROR_SERVER_HOST }}
          username: ${{ secrets.MIRROR_SERVER_USER }}
          key: ${{ secrets.MIRROR_SERVER_SSH_KEY }}
          port: ${{ secrets.MIRROR_SERVER_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            REF="main"
            ROOT_PATH="${{ secrets.MIRROR_ROOT_PATH || '/home/pi/kor35-replica' }}"
            MIRROR_REPO_PATH="${{ secrets.MIRROR_BACKEND_PATH || '/home/pi/kor35-replica' }}"
            MIRROR_REPO_URL="${{ secrets.MIRROR_BACKEND_REPO_URL || '' }}"
            COMPOSE_PROJECT_NAME="${{ secrets.MIRROR_COMPOSE_PROJECT_NAME || 'kor35-replica' }}"
            HEALTHCHECK_URL="${{ secrets.MIRROR_HEALTHCHECK_URL || '' }}"
            RUN_MIGRATIONS="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations || 'true' }}"

            if [ -d "${ROOT_PATH}" ]; then
              MIRROR_REPO_PATH="${ROOT_PATH}"
            fi

            if [ ! -d "${MIRROR_REPO_PATH}" ]; then
              if [ -n "${MIRROR_REPO_URL}" ]; then
                mkdir -p "$(dirname "${MIRROR_REPO_PATH}")"
                git clone "${MIRROR_REPO_URL}" "${MIRROR_REPO_PATH}"
              else
                echo "Repo mirror non trovato: ${MIRROR_REPO_PATH}. Imposta MIRROR_ROOT_PATH/MIRROR_BACKEND_PATH oppure MIRROR_BACKEND_REPO_URL." >&2
                exit 1
              fi
            fi

            cd "${MIRROR_REPO_PATH}"
            git fetch --all --tags
            if git show-ref --verify --quiet "refs/remotes/origin/${REF}"; then
              git checkout -B "${REF}" "origin/${REF}"
              git reset --hard "origin/${REF}"
            else
              git checkout "${REF}"
              git reset --hard "${REF}"
            fi
            MIRROR_BACKEND_DEPLOYED_SHA="$(git rev-parse HEAD)"
            export KOR35_BUILD_SHA="${MIRROR_BACKEND_DEPLOYED_SHA}"
            export KOR35_BUILD_VERSION="g$(git rev-parse --short HEAD)"
            export KOR35_BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "MIRROR_BACKEND_DEPLOYED_SHA=${MIRROR_BACKEND_DEPLOYED_SHA}"

            if [ ! -f "config/docker/compose.base.yml" ]; then
              echo "Monorepo docker non rilevato su mirror (manca config/docker/compose.base.yml)." >&2
              exit 1
            fi

            export KOR35_BACKEND_ENV_FILE="${MIRROR_REPO_PATH}/backend/.env.mirror"
            if [ ! -f "${KOR35_BACKEND_ENV_FILE}" ]; then
              echo "File env mirror mancante: ${KOR35_BACKEND_ENV_FILE}" >&2
              exit 1
            fi

            cd "${MIRROR_REPO_PATH}/config/docker"
            export COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME}"
            docker compose -f compose.base.yml -f compose.mirror.yml up -d --build
            if [ "${RUN_MIGRATIONS}" = "true" ]; then
              docker compose -f compose.base.yml -f compose.mirror.yml exec -T backend python manage.py migrate --noinput
            fi
            docker compose -f compose.base.yml -f compose.mirror.yml exec -T backend python manage.py collectstatic --noinput

            docker compose -f compose.base.yml -f compose.mirror.yml exec -T frontend nginx -s reload 2>/dev/null || true

            if [ -n "${HEALTHCHECK_URL}" ]; then
              curl -fsS "${HEALTHCHECK_URL}" >/dev/null
            fi
            echo "Mirror deploy OK"
