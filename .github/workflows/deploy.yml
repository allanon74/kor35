name: Safe Release Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref da deployare (branch, tag o SHA)"
        required: false
        default: "main"
      run_migrations:
        description: "Eseguire migrate su staging/production"
        required: true
        default: true
        type: boolean

jobs:
  staging-validate:
    name: Staging validate (migrate + smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Deploy and validate on Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          port: ${{ secrets.STAGING_SERVER_SSH_PORT || 22 }}
          script: |
            cd ~/progetti/kor35
            git fetch --all --tags
            git checkout "${{ github.event.inputs.ref || 'main' }}"
            git reset --hard "${{ github.event.inputs.ref || 'main' }}"
            source ~/ambienti/kor35/bin/activate

            pip install -r requirements.txt
            python manage.py migrate --plan
            if [ "${{ github.event.inputs.run_migrations }}" = "true" ]; then
              python manage.py migrate --noinput
            fi
            python manage.py check --deploy
            python manage.py collectstatic --noinput
            sudo systemctl restart apache2.service
            sudo systemctl restart kor35-daphne
            curl -fsS "${{ secrets.STAGING_HEALTHCHECK_URL }}" >/dev/null
            echo "Staging validation OK"

  production-approval:
    name: Manual approval for production
    runs-on: ubuntu-latest
    needs: [staging-validate]
    steps:
      - name: Awaiting environment approval
        run: 'echo "Approved: continue with production deploy."'

  production-deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    needs: [production-approval]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Backup and deploy on Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script: |
            cd ~/progetti/kor35
            git fetch --all --tags
            PREVIOUS_SHA="$(git rev-parse HEAD)"
            echo "PREVIOUS_SHA=${PREVIOUS_SHA}"
            git checkout "${{ github.event.inputs.ref || 'main' }}"
            git reset --hard "${{ github.event.inputs.ref || 'main' }}"
            source ~/ambienti/kor35/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --plan
            if [ "${{ github.event.inputs.run_migrations }}" = "true" ]; then
              python manage.py migrate --noinput
            fi
            python manage.py check --deploy
            python manage.py collectstatic --noinput
            sudo systemctl restart apache2.service
            sudo systemctl restart kor35-daphne
            curl -fsS "${{ secrets.PRODUCTION_HEALTHCHECK_URL }}" >/dev/null
            echo "Production deploy OK"
