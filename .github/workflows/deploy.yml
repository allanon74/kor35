name: Safe Monorepo Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "config/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref da deployare (branch, tag o SHA)"
        required: false
        default: "main"
      run_migrations:
        description: "Eseguire migrate su staging/production"
        required: true
        default: true
        type: boolean

concurrency:
  group: safe-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      config: ${{ steps.filter.outputs.config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || 'main' }}
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            config:
              - 'config/**'

  production-deploy:
    name: Production backend deploy
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.config == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || 'main' }}

      - name: Backup and deploy on Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          command_timeout: 40m
          script: |
            set -euo pipefail
            REF="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || 'main' }}"
            RUN_MIGRATIONS="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations || 'true' }}"
            PROJECT_PATH="${{ secrets.SERVER_PROJECT_PATH || '' }}"
            if [ -z "${PROJECT_PATH}" ]; then
              EFFECTIVE_USER="${USER:-$(id -un)}"
              for CANDIDATE in \
                "$HOME/progetti/kor35" \
                "$HOME/kor35" \
                "/home/${EFFECTIVE_USER}/progetti/kor35" \
                "/home/${EFFECTIVE_USER}/kor35" \
                "/var/www/kor35" \
                "/srv/kor35" \
                "/opt/kor35"
              do
                if [ -d "${CANDIDATE}" ]; then
                  PROJECT_PATH="${CANDIDATE}"
                  break
                fi
              done
            fi
            if [ -n "${PROJECT_PATH}" ] && [ ! -f "${PROJECT_PATH}/manage.py" ]; then
              PROJECT_PATH=""
            fi
            if [ -z "${PROJECT_PATH}" ]; then
              echo "Path progetto production non trovato. Imposta secret SERVER_PROJECT_PATH con il path completo (es. /home/<user>/progetti/kor35)." >&2
              exit 1
            fi

            # Monorepo compat: backend in /backend (nuovo layout) oppure root (layout legacy).
            if [ -f "${PROJECT_PATH}/backend/manage.py" ]; then
              BACKEND_DIR="${PROJECT_PATH}/backend"
            elif [ -f "${PROJECT_PATH}/manage.py" ]; then
              BACKEND_DIR="${PROJECT_PATH}"
            else
              echo "manage.py non trovato né in ${PROJECT_PATH}/backend né in ${PROJECT_PATH}." >&2
              exit 1
            fi
            cd "${BACKEND_DIR}"
            git fetch --all --tags
            PREVIOUS_SHA="$(git rev-parse HEAD)"
            echo "PREVIOUS_SHA=${PREVIOUS_SHA}"
            if git show-ref --verify --quiet "refs/remotes/origin/${REF}"; then
              git checkout -B "${REF}" "origin/${REF}"
              git reset --hard "origin/${REF}"
            else
              git checkout "${REF}"
              git reset --hard "${REF}"
            fi
            DEPLOYED_SHA="$(git rev-parse HEAD)"
            export KOR35_BUILD_SHA="${DEPLOYED_SHA}"
            export KOR35_BUILD_VERSION="g$(git rev-parse --short HEAD)"
            export KOR35_BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "DEPLOYED_SHA=${DEPLOYED_SHA}"
            source ~/ambienti/kor35/bin/activate
            export TMPDIR="$HOME/tmp"
            mkdir -p "$TMPDIR"

            pip install --prefer-binary -r requirements.txt
            python manage.py migrate --plan
            if [ "${RUN_MIGRATIONS}" = "true" ]; then
              python manage.py migrate --noinput
            fi
            python manage.py check --deploy
            python manage.py collectstatic --noinput

            # Deploy config (opzionale): se presenti file in repo e dest definite via secrets.
            # - APACHE_SITE_DEST: es. /etc/apache2/sites-available/kor35.conf
            APACHE_SITE_DEST="${{ secrets.APACHE_SITE_DEST || '' }}"
            APACHE_SITE_SRC=""
            if [ -f "${PROJECT_PATH}/config/production/apache/kor35.conf" ]; then
              APACHE_SITE_SRC="${PROJECT_PATH}/config/production/apache/kor35.conf"
            elif [ -f "${PROJECT_PATH}/backend/conf/apache/kor35-unified.conf" ]; then
              # fallback legacy (finché non migriamo davvero i file in /config)
              APACHE_SITE_SRC="${PROJECT_PATH}/backend/conf/apache/kor35-unified.conf"
            fi
            if [ -n "${APACHE_SITE_DEST}" ] && [ -n "${APACHE_SITE_SRC}" ]; then
              if [ ! -f "${APACHE_SITE_DEST}" ] || ! /usr/bin/cmp -s "${APACHE_SITE_SRC}" "${APACHE_SITE_DEST}"; then
                sudo -n /bin/cp "${APACHE_SITE_SRC}" "${APACHE_SITE_DEST}"
                sudo -n /usr/bin/systemctl reload apache2.service
              fi
            fi
            sudo systemctl restart apache2.service
            sudo systemctl restart kor35-daphne
            curl -fsS "${{ secrets.PRODUCTION_HEALTHCHECK_URL }}" >/dev/null
            echo "Production deploy OK"

  mirror-deploy:
    name: Mirror Raspberry backend deploy
    runs-on: ubuntu-latest
    needs: [production-deploy]
    steps:
      - name: Deploy backend to mirror via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MIRROR_SERVER_HOST }}
          username: ${{ secrets.MIRROR_SERVER_USER }}
          key: ${{ secrets.MIRROR_SERVER_SSH_KEY }}
          port: ${{ secrets.MIRROR_SERVER_SSH_PORT || 22 }}
          script: |
            REF="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || 'main' }}"
            ROOT_PATH="${{ secrets.MIRROR_ROOT_PATH || '/home/pi/kor35-replica' }}"
            # Monorepo: un solo clone; backend è in /backend.
            MONOREPO_PATH="${{ secrets.MIRROR_MONOREPO_PATH || '' }}"
            MONOREPO_REPO_URL="${{ secrets.MIRROR_MONOREPO_REPO_URL || '' }}"

            BACKEND_PATH="${{ secrets.MIRROR_BACKEND_PATH || '/home/pi/kor35-replica/backend_src' }}"
            BACKEND_REPO_URL="${{ secrets.MIRROR_BACKEND_REPO_URL || '' }}"
            DEPLOY_CMD="${{ secrets.MIRROR_DEPLOY_COMMAND || 'docker compose up -d --build' }}"

            # Prefer monorepo layout se configurato; fallback al layout legacy.
            if [ -n "${MONOREPO_PATH}" ]; then
              if [ ! -d "${MONOREPO_PATH}" ]; then
                if [ -n "${MONOREPO_REPO_URL}" ]; then
                  mkdir -p "$(dirname "${MONOREPO_PATH}")"
                  git clone "${MONOREPO_REPO_URL}" "${MONOREPO_PATH}"
                else
                  echo "MONOREPO_PATH non esiste: ${MONOREPO_PATH}. Imposta MIRROR_MONOREPO_REPO_URL." >&2
                  exit 1
                fi
              fi
              cd "${MONOREPO_PATH}"
            else
              if [ ! -d "${BACKEND_PATH}" ]; then
                if [ -n "${BACKEND_REPO_URL}" ]; then
                  mkdir -p "$(dirname "${BACKEND_PATH}")"
                  git clone "${BACKEND_REPO_URL}" "${BACKEND_PATH}"
                else
                  echo "BACKEND_PATH non esiste: ${BACKEND_PATH}. Imposta MIRROR_BACKEND_PATH corretto o MIRROR_BACKEND_REPO_URL." >&2
                  exit 1
                fi
              fi
              cd "${BACKEND_PATH}"
            fi

            git fetch --all --tags
            if git show-ref --verify --quiet "refs/remotes/origin/${REF}"; then
              git checkout -B "${REF}" "origin/${REF}"
              git reset --hard "origin/${REF}"
            else
              git checkout "${REF}"
              git reset --hard "${REF}"
            fi
            MIRROR_BACKEND_DEPLOYED_SHA="$(git rev-parse HEAD)"
            export KOR35_BUILD_SHA="${MIRROR_BACKEND_DEPLOYED_SHA}"
            export KOR35_BUILD_VERSION="g$(git rev-parse --short HEAD)"
            export KOR35_BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "MIRROR_BACKEND_DEPLOYED_SHA=${MIRROR_BACKEND_DEPLOYED_SHA}"

            cd "${ROOT_PATH}"
            eval "${DEPLOY_CMD}"

            # Rete di sicurezza: dopo ricreazione container backend/daphne, Nginx (se non ricreato)
            # può tenere IP vecchi; reload + snippet resolver in common_locations.snippets mitigano 502.
            docker compose exec -T frontend nginx -s reload 2>/dev/null || true

            if [ -n "${{ secrets.MIRROR_HEALTHCHECK_URL }}" ]; then
              curl -fsS "${{ secrets.MIRROR_HEALTHCHECK_URL }}" >/dev/null
            fi
            echo "Mirror deploy OK"

  frontend-production:
    name: Production frontend deploy
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.config == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || 'main' }}
      - name: Deploy frontend on production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            REF="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || 'main' }}"
            source /etc/profile
            set -euo pipefail
            if [ "$(id -u)" -eq 0 ]; then
              SUDO=""
            else
              SUDO="sudo -n"
            fi
            cd "${{ secrets.REPO_PATH_ON_SERVER }}"
            git fetch --all --tags
            if git show-ref --verify --quiet "refs/remotes/origin/${REF}"; then
              git checkout -B "${REF}" "origin/${REF}"
              git reset --hard "origin/${REF}"
            else
              git checkout "${REF}"
              git reset --hard "${REF}"
            fi

            # Monorepo compat: frontend in /frontend (nuovo layout) oppure root (layout legacy).
            if [ -f "${{ secrets.REPO_PATH_ON_SERVER }}/frontend/package.json" ]; then
              cd "${{ secrets.REPO_PATH_ON_SERVER }}/frontend"
            fi
            export VITE_BUILD_SHA="$(git rev-parse HEAD)"
            export VITE_BUILD_VERSION="g$(git rev-parse --short HEAD)"
            export VITE_BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "FRONTEND_DEPLOYED_SHA=${VITE_BUILD_SHA}"
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            export NODE_OPTIONS="--max-old-space-size=4096"
            npm run build
            if [ -d dist ]; then
              test -f dist/index.html || { echo "dist/index.html mancante dopo build" >&2; exit 1; }
            elif [ -d build ]; then
              test -f build/index.html || { echo "build/index.html mancante dopo build" >&2; exit 1; }
            fi
            ${SUDO} /bin/rm -rf "${{ secrets.DEPLOY_TARGET_PATH }}"/*
            if [ -d dist ]; then
              ${SUDO} /bin/cp -R dist/. "${{ secrets.DEPLOY_TARGET_PATH }}/"
            elif [ -d build ]; then
              ${SUDO} /bin/cp -R build/. "${{ secrets.DEPLOY_TARGET_PATH }}/"
            else
              echo "Nessuna cartella dist/build trovata dopo npm run build" >&2
              exit 1
            fi
            test -f "${{ secrets.DEPLOY_TARGET_PATH }}/index.html" || { echo "index.html non pubblicato in DEPLOY_TARGET_PATH" >&2; exit 1; }
            ${SUDO} /usr/bin/systemctl restart apache2.service
            if [ -n "${{ secrets.FRONTEND_HEALTHCHECK_URL }}" ]; then
              curl -fsS "${{ secrets.FRONTEND_HEALTHCHECK_URL }}" >/dev/null
            fi
            echo "Production frontend deploy OK"

  frontend-mirror:
    name: Mirror Raspberry frontend deploy
    runs-on: ubuntu-latest
    needs: [frontend-production]
    steps:
      - name: Deploy frontend to mirror via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MIRROR_SERVER_HOST }}
          username: ${{ secrets.MIRROR_SERVER_USER }}
          key: ${{ secrets.MIRROR_SERVER_SSH_KEY }}
          port: ${{ secrets.MIRROR_SERVER_SSH_PORT || 22 }}
          script: |
            REF="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || 'main' }}"
            MONOREPO_PATH="${{ secrets.MIRROR_MONOREPO_PATH || '' }}"
            MONOREPO_REPO_URL="${{ secrets.MIRROR_MONOREPO_REPO_URL || '' }}"

            FRONTEND_PATH="${{ secrets.MIRROR_FRONTEND_PATH || '/home/pi/kor35-replica/frontend_src' }}"
            FRONTEND_PATH_LEGACY="/home/pi/kor35-replica/forntend_src"
            MIRROR_ROOT_PATH="${{ secrets.MIRROR_ROOT_PATH || '/home/pi/kor35-replica' }}"
            REACT_BUILD_PATH="${{ secrets.MIRROR_REACT_BUILD_PATH || '/home/pi/kor35-replica/react_build' }}"
            FRONTEND_REPO_URL="${{ secrets.MIRROR_FRONTEND_REPO_URL || '' }}"
            MIRROR_POST_DEPLOY_CMD="${{ secrets.MIRROR_FRONTEND_POST_DEPLOY_COMMAND || '' }}"
            COMPOSE_PROJECT_NAME="${{ secrets.MIRROR_COMPOSE_PROJECT_NAME || 'kor35-replica' }}"

            source /etc/profile
            set -euo pipefail

            # Prefer monorepo layout se configurato; fallback al layout legacy.
            if [ -n "${MONOREPO_PATH}" ]; then
              if [ ! -d "${MONOREPO_PATH}" ]; then
                if [ -n "${MONOREPO_REPO_URL}" ]; then
                  mkdir -p "$(dirname "${MONOREPO_PATH}")"
                  git clone "${MONOREPO_REPO_URL}" "${MONOREPO_PATH}"
                else
                  echo "MONOREPO_PATH non esiste: ${MONOREPO_PATH}. Imposta MIRROR_MONOREPO_REPO_URL." >&2
                  exit 1
                fi
              fi
              cd "${MONOREPO_PATH}"
              git fetch --all --tags
              if git show-ref --verify --quiet "refs/remotes/origin/${REF}"; then
                git checkout -B "${REF}" "origin/${REF}"
                git reset --hard "origin/${REF}"
              else
                git checkout "${REF}"
                git reset --hard "${REF}"
              fi
              cd "${MONOREPO_PATH}/frontend"
            else
              if [ ! -d "${FRONTEND_PATH}" ] && [ -d "${FRONTEND_PATH_LEGACY}" ]; then
                FRONTEND_PATH="${FRONTEND_PATH_LEGACY}"
              fi
              if [ ! -d "${FRONTEND_PATH}" ]; then
                if [ -n "${FRONTEND_REPO_URL}" ]; then
                  mkdir -p "$(dirname "${FRONTEND_PATH}")"
                  git clone "${FRONTEND_REPO_URL}" "${FRONTEND_PATH}"
                else
                  echo "FRONTEND_PATH non esiste: ${FRONTEND_PATH}. Imposta MIRROR_FRONTEND_PATH corretto o MIRROR_FRONTEND_REPO_URL." >&2
                  exit 1
                fi
              fi
              cd "${FRONTEND_PATH}"
              git fetch --all --tags
              if git show-ref --verify --quiet "refs/remotes/origin/${REF}"; then
                git checkout -B "${REF}" "origin/${REF}"
                git reset --hard "origin/${REF}"
              else
                git checkout "${REF}"
                git reset --hard "${REF}"
              fi
            fi

            export VITE_BUILD_SHA="$(git rev-parse HEAD)"
            export VITE_BUILD_VERSION="g$(git rev-parse --short HEAD)"
            export VITE_BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "MIRROR_FRONTEND_DEPLOYED_SHA=${VITE_BUILD_SHA}"
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            unset VITE_API_URL
            export NODE_OPTIONS="--max-old-space-size=4096"
            npm run build

            mkdir -p "${REACT_BUILD_PATH}"
            if [ -d dist ]; then
              rsync -a --delete dist/ "${REACT_BUILD_PATH}/"
            elif [ -d build ]; then
              rsync -a --delete build/ "${REACT_BUILD_PATH}/"
            else
              echo "Nessuna cartella dist/build trovata dopo npm run build" >&2
              exit 1
            fi

            if [ ! -d "${MIRROR_ROOT_PATH}" ]; then
              echo "MIRROR_ROOT_PATH non esiste: ${MIRROR_ROOT_PATH}" >&2
              exit 1
            fi
            if [ ! -f "${MIRROR_ROOT_PATH}/docker-compose.yml" ]; then
              echo "docker-compose.yml non trovato in MIRROR_ROOT_PATH: ${MIRROR_ROOT_PATH}" >&2
              exit 1
            fi
            cd "${MIRROR_ROOT_PATH}"
            export COMPOSE_FILE="${MIRROR_ROOT_PATH}/docker-compose.yml"
            export COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME}"

            docker compose -f "${COMPOSE_FILE}" up -d frontend
            docker compose -f "${COMPOSE_FILE}" exec -T frontend nginx -s reload 2>/dev/null || true

            if [ -n "${MIRROR_POST_DEPLOY_CMD}" ]; then
              case "${MIRROR_POST_DEPLOY_CMD}" in
                *"--build"*|*"backend"*|*"daphne"*)
                  echo "MIRROR_FRONTEND_POST_DEPLOY_COMMAND ignorato: contiene build/backend/daphne (non consentito nel job frontend)." >&2
                  ;;
                *)
                  eval "${MIRROR_POST_DEPLOY_CMD}"
                  ;;
              esac
            fi

            if [ -n "${{ secrets.MIRROR_FRONTEND_HEALTHCHECK_URL }}" ]; then
              curl -fsS "${{ secrets.MIRROR_FRONTEND_HEALTHCHECK_URL }}" >/dev/null
            fi
            echo "Mirror frontend deploy OK"
