services:
  # --- DATABASE (PostgreSQL) ---
  db:
    image: postgres:15-alpine
    container_name: kor35_db
    restart: always
    environment:
      POSTGRES_DB: kor35_db
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: 4_Tru87M#zt
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

# --- REDIS (Per i WebSockets di Django Channels) ---
  redis:
    image: redis:7-alpine
    container_name: kor35_redis
    restart: always
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 8
      start_period: 5s

  # --- BACKEND (Django - Gunicorn/WSGI) ---
  backend:
    build: 
      context: ./backend_src
    container_name: django_app
    restart: always
    env_file:                
      - ./backend_src/.env   
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=False  # <-- Lascia solo il debug qui, il DB lo legge dal .env!
    volumes:
      - ./backend_src:/app
      - ./static_data:/app/static
      - ./media_data:/app/media
    expose:
      - "8000"
    command: gunicorn kor35.wsgi:application --bind 0.0.0.0:8000 --timeout 120 --graceful-timeout 30
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/healthz/').read()\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 120s

  # --- DAPHNE (WebSockets / ASGI) ---
  daphne:
    build: 
      context: ./backend_src
    container_name: daphne_app
    restart: always
    env_file:                
      - ./backend_src/.env   
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=False  # <-- Idem come sopra
    volumes:
      - ./backend_src:/app
      - ./static_data:/app/static
      - ./media_data:/app/media
    expose:
      - "8001"
    command: daphne -b 0.0.0.0 -p 8001 kor35.asgi:application
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/healthz/').read()\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 120s

# --- FRONTEND (Nginx + React Build) ---
  frontend:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"    # <-- AGGIUNTA LA PORTA HTTPS
    volumes:
      - ./nginx_conf:/etc/nginx/conf.d
      - ./react_build:/usr/share/nginx/html
      - ./static_data:/app/static
      - ./media_data:/app/media
      - ./certs:/etc/nginx/certs:ro
      - ./certs_ddns:/etc/nginx/certs_ddns:ro      # <-- AGGIUNTA LA CARTELLA DEI CERTIFICATI
    depends_on:
      backend:
        condition: service_healthy
      daphne:
        condition: service_healthy

  # --- CONTROLLER ANTENNE (TP-Link Omada) ---
  omada-controller:
    image: mbentley/omada-controller:latest
    container_name: omada_controller
    restart: unless-stopped
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - MANAGE_HTTP_PORT=8088
      - MANAGE_HTTPS_PORT=8043
    volumes:
      - ./omada_data:/opt/tplink/EAPController/data
      - ./omada_logs:/opt/tplink/EAPController/logs