<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName www.k-o-r-35.it
    ServerAlias www.kor35.it app.k-o-r-35.it app.kor35.it

    # REACT è la base di partenza (DocumentRoot)
    DocumentRoot /var/www/kor35-app

    SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1
    SetEnvIf Origin "^(https?://(localhost:5173|www\.k-o-r-35\.it|app\.k-o-r-35\.it|kor35\.it|www\.kor35\.it|app\.kor35\.it))$" ALLOWED_CORS_ORIGIN=$0
	
	<LocationMatch "^/(api|webpush)">
        Header always set Access-Control-Allow-Origin "%{ALLOWED_CORS_ORIGIN}e" env=ALLOWED_CORS_ORIGIN
        Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS, PATCH, PUT, DELETE" env=ALLOWED_CORS_ORIGIN
        Header always set Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" env=ALLOWED_CORS_ORIGIN
        Header always set Access-Control-Allow-Credentials "true" env=ALLOWED_CORS_ORIGIN
        Header always set Vary "Origin" env=ALLOWED_CORS_ORIGIN
    </LocationMatch>
	
    # --- WEBSOCKETS (Canale verso Daphne) ---
    RewriteEngine on
    ProxyPass /ws/ ws://127.0.0.1:8001/ws/
    ProxyPassReverse /ws/ ws://127.0.0.1:8001/ws/

    # --- ALIAS STATICI E MEDIA (Django) ---
    Alias /static /var/www/django/static
    Alias /media /var/www/django/media

    <Directory /var/www/django/static>
        Options FollowSymlinks
        Require all granted
        Header set Access-Control-Allow-Origin %{ALLOWED_CORS_ORIGIN}e env=ALLOWED_CORS_ORIGIN
        Header set Vary Origin
    </Directory>

    <Directory /var/www/django/media>
        Require all granted
        Header set Access-Control-Allow-Origin %{ALLOWED_CORS_ORIGIN}e env=ALLOWED_CORS_ORIGIN
        Header set Vary Origin
    </Directory>

    # --- CONFIGURAZIONE WSGI (DJANGO BACKEND) ---
    WSGIProcessGroup kor35
    WSGIDaemonProcess kor35 user=django group=django python-home=/home/django/ambienti/kor35 python-path=/home/django/progetti/kor35:/home/django/ambienti/kor35/lib/python3.11/site-packages
    
    # Mappiamo Django su un path fittizio "_django" per non sovrascrivere React sulla root
    WSGIScriptAlias /_django /home/django/progetti/kor35/kor35/wsgi.py application-group=%{GLOBAL}

    <Directory /home/django/progetti/kor35/kor35>
        Options FollowSymlinks
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    # --- ROUTING SMART CON MOD_REWRITE ---
    # 1. Intercettiamo le rotte di Django e le passiamo al demone WSGI usando il flag [PT] (Pass Through)
    RewriteRule ^/admin(/.*)?$ /_django/admin$1 [PT,L]
    RewriteRule ^/api(/.*)?$ /_django/api$1 [PT,L]
    RewriteRule ^/summernote(/.*)?$ /_django/summernote$1 [PT,L]
    RewriteRule ^/icon_picker(/.*)?$ /_django/icon_picker$1 [PT,L]
    RewriteRule ^/icons(/.*)?$ /_django/icons$1 [PT,L]
    RewriteRule ^/webpush(/.*)?$ /_django/webpush$1 [PT,L]
    RewriteRule ^/o(/.*)?$ /_django/o$1 [PT,L]

    # 2. Configurazione React SPA fallback
    <Directory /var/www/kor35-app>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        DirectoryIndex index.html
        Require all granted
        
        RewriteEngine On
        # Ignora i path riservati a backend/media/asset.
        # NOTA: non escludiamo /app, cosi /app e /app/* vanno alla SPA su refresh.
        RewriteCond %{REQUEST_URI} !^/(_django|admin|summernote|icon_picker|icons|webpush|o|static|media|ws|assets)
        # Se il file o la directory non esiste fisicamente...
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        # ...servi index.html di React
        RewriteRule . /index.html [L]
    </Directory>

    # --- LOGGING E CERTIFICATI ---
    ServerAdmin giorgio.bertoluzza@gmail.com
    LogLevel trace3
    ErrorLog ${APACHE_LOG_DIR}/kor35_unified_error.log
    CustomLog ${APACHE_LOG_DIR}/kor35_unified_access.log combined

    Include /etc/letsencrypt/options-ssl-apache.conf
    # Assicurati che questo certificato includa i domini www e app tra i Subject Alternative Names (SANs)
    SSLCertificateFile /etc/letsencrypt/live/app.k-o-r-35.it/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/app.k-o-r-35.it/privkey.pem
</VirtualHost>
</IfModule>