<IfModule mod_ssl.c>
<VirtualHost *:443>
     ServerAdmin giorgio.bertoluzza@gmail.com
     DocumentRoot /var/www/ossn/
     ServerName social.kor35.it
     ServerAlias social.k-o-r-35.it

     <Directory /var/www/ossn/>
          Options +FollowSymlinks
          AllowOverride All
	  Require all granted
	  Order allow,deny
	  allow from all
     </Directory>

     ErrorLog ${APACHE_LOG_DIR}/ossn.log
     CustomLog ${APACHE_LOG_DIR}/ossn_custom.log common
RewriteEngine on
# Some rewrite rules in this file were disabled on your HTTPS site,
# because they have the potential to create redirection loops.

# RewriteCond %{SERVER_NAME} =social.k-o-r-35.it
# RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]

Include /etc/letsencrypt/options-ssl-apache.conf
SSLCertificateFile /etc/letsencrypt/live/social.kor35.it/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/social.kor35.it/privkey.pem
</VirtualHost>
</IfModule>
