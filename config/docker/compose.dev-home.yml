# dev-home: stack locale WSL; sync verso master opzionale (EDGE_SYNC_URL vuoto = DB isolato).

services:
  db:
    container_name: kor35_devhome_db
    volumes:
      - kor35_devhome_postgres_data:/var/lib/postgresql/data

  redis:
    container_name: kor35_devhome_redis

  backend:
    container_name: kor35_devhome_backend
    environment:
      KOR35_SYNC_NODE_ROLE: local
      EDGE_SYNC_STATE_FILE: /app/runtime-state/edge_sync_dev-home.json
    volumes:
      - ../../backend:/app
      - ../../docs/wiki/staff:/app/wiki_staff_content:ro
      - ../../docs/wiki/carte:/app/wiki_carte_content:ro
      - ./nginx-docker/static_data:/app/static
      - ./nginx-docker/media_data:/app/media

  daphne:
    container_name: kor35_devhome_daphne
    volumes:
      - ../../backend:/app
      - ../../docs/wiki/staff:/app/wiki_staff_content:ro
      - ../../docs/wiki/carte:/app/wiki_carte_content:ro
      - ./nginx-docker/static_data:/app/static
      - ./nginx-docker/media_data:/app/media

  pilot_tick:
    container_name: kor35_devhome_pilot_tick
    volumes:
      - ../../backend:/app
      - ../../docs/wiki/staff:/app/wiki_staff_content:ro
      - ../../docs/wiki/carte:/app/wiki_carte_content:ro
      - ./nginx-docker/static_data:/app/static
      - ./nginx-docker/media_data:/app/media

  frontend:
    container_name: kor35_devhome_frontend
    ports:
      - "8080:80"
    volumes:
      - ./nginx-docker/nginx_conf_wsl:/etc/nginx/conf.d
      - ./nginx-docker/react_build:/usr/share/nginx/html
      - ./nginx-docker/react_build_pilot:/usr/share/nginx/pilot
      - ./nginx-docker/static_data:/app/static
      - ./nginx-docker/media_data:/app/media

volumes:
  kor35_devhome_postgres_data:
