services:
  db:
    container_name: kor35_mirror_db
    volumes:
      - ./nginx-docker/postgres_data:/var/lib/postgresql/data

  redis:
    container_name: kor35_mirror_redis

  backend:
    container_name: kor35_mirror_backend
    volumes:
      - ./nginx-docker/static_data:/app/static
      - ./nginx-docker/media_data:/app/media

  daphne:
    container_name: kor35_mirror_daphne
    volumes:
      - ./nginx-docker/static_data:/app/static
      - ./nginx-docker/media_data:/app/media

  pilot_tick:
    container_name: kor35_mirror_pilot_tick
    volumes:
      - ./nginx-docker/static_data:/app/static
      - ./nginx-docker/media_data:/app/media

  frontend:
    container_name: kor35_mirror_frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-docker/nginx_conf:/etc/nginx/conf.d
      - ./nginx-docker/react_build:/usr/share/nginx/html
      - ./nginx-docker/react_build_pilot:/usr/share/nginx/pilot
      - ./nginx-docker/static_data:/app/static
      - ./nginx-docker/media_data:/app/media
      - ./nginx-docker/certs:/etc/nginx/certs:ro
      - ./nginx-docker/certs_ddns:/etc/nginx/certs_ddns:ro

  omada-controller:
    # Pin versione: evita downgrade involontari (es. latest -> 5.x) che bloccano l'avvio
    # quando i dati sono già stati aperti da una 6.x (guard rail LAST_RAN_OMADA_VER.txt).
    image: mbentley/omada-controller:6.1.0.19
    container_name: omada_controller
    restart: unless-stopped
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - MANAGE_HTTP_PORT=8088
      - MANAGE_HTTPS_PORT=8043
    # Path alla root del monorepo (../../ da config/docker): stesso layout già usato sul Pi
    # (/home/pi/kor35-replica/omada_*), così al passaggio a compose.base+mirror non serve spostare i dati.
    volumes:
      - ../../omada_data:/opt/tplink/EAPController/data
      - ../../omada_logs:/opt/tplink/EAPController/logs
