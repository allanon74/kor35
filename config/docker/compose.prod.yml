# prod: nodo master sync (nessun EDGE_SYNC_URL); le replica pushano qui via /api/sync/edge/.

services:
  db:
    container_name: kor35_prod_db
    # Solo produzione: PG17 per pg_restore compatibile con dump pg_dump 16+ (mirror/Pi restano su compose.base → PG15).
    image: postgres:17-alpine
    volumes:
      - ./nginx-docker/postgres_data:/var/lib/postgresql/data

  redis:
    container_name: kor35_prod_redis

  backend:
    container_name: kor35_prod_backend
    environment:
      KOR35_SYNC_NODE_ROLE: master
      EDGE_SYNC_STATE_FILE: /app/runtime-state/edge_sync_prod.json
    volumes:
      - ./nginx-docker/static_data:/app/static
      - ./nginx-docker/media_data:/app/media
    # Primo avvio su DB vuoto: migrate richiede diversi minuti; l'healthcheck di default (120s) falliva prima di Gunicorn.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/healthz/').read()\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 600s

  daphne:
    container_name: kor35_prod_daphne
    volumes:
      - ./nginx-docker/static_data:/app/static
      - ./nginx-docker/media_data:/app/media

  pilot_tick:
    container_name: kor35_prod_pilot_tick
    volumes:
      - ./nginx-docker/static_data:/app/static
      - ./nginx-docker/media_data:/app/media

  frontend:
    container_name: kor35_prod_frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-docker/nginx_conf:/etc/nginx/conf.d
      - ./nginx-docker/react_build:/usr/share/nginx/html
      - ./nginx-docker/react_build_pilot:/usr/share/nginx/pilot
      - ./nginx-docker/static_data:/app/static
      - ./nginx-docker/media_data:/app/media
      - ./nginx-docker/certs:/etc/nginx/certs:ro
      - ./nginx-docker/certbot_webroot:/var/www/certbot:ro
