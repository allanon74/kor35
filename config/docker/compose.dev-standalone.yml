services:
  db:
    image: postgres:17-alpine
    container_name: kor35_dev_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kor35_dev
      POSTGRES_USER: kor35_dev
      POSTGRES_PASSWORD: kor35_dev
    ports:
      - "5432:5432"
    volumes:
      - kor35_dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: kor35_dev_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  kor35_dev_postgres_data:
