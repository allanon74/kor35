# Stack KOR35 — base condiviso (dev-home, dev-office, mirror, prod).
#
# Sincronizzazione Edge (LWW su sync_id + updated_at):
#   - Master: prod — espone POST /api/sync/edge/; lasciare EDGE_SYNC_URL vuoto in .env.prod
#   - Replica: dev-office, mirror — EDGE_SYNC_URL + EDGE_SYNC_TOKEN verso il master
#   - Locale isolato: dev-home — sync opzionale (URL vuoto = nessun pull)
# Dopo migrazioni o campi nuovi su modelli SyncableModel: migrate su tutti i nodi, poi
#   make sync-db-full ENV=<replica>  oppure timer mirror; modifiche staff preferibilmente sul master.
# Stato incrementale pull: backend monta ../../.runtime-state (gitignored).
# Vedi config/docker/SYNC.md

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kor35_dev}
      POSTGRES_USER: ${POSTGRES_USER:-kor35_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kor35_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ../../backend
    restart: unless-stopped
    env_file:
      - ${KOR35_BACKEND_ENV_FILE:-../../backend/.env}
    volumes:
      - ../../.runtime-state:/app/runtime-state
      - ../../docs/wiki/staff:/app/wiki_staff_content:ro
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      ENVIRONMENT: raspberry_docker
      KOR35_SYNC_NODE_ROLE: ${KOR35_SYNC_NODE_ROLE:-unset}
      EDGE_SYNC_STATE_FILE: ${EDGE_SYNC_STATE_FILE:-/app/runtime-state/edge_sync_state.json}
      HTTP_PROXY: ${HTTP_PROXY-}
      HTTPS_PROXY: ${HTTPS_PROXY-}
      NO_PROXY: ${NO_PROXY-}
      http_proxy: ${HTTP_PROXY-}
      https_proxy: ${HTTPS_PROXY-}
      no_proxy: ${NO_PROXY-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
      gunicorn kor35.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 900 --graceful-timeout 120 --access-logfile - --error-logfile - --capture-output"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/healthz/').read()\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s

  daphne:
    build:
      context: ../../backend
    restart: unless-stopped
    env_file:
      - ${KOR35_BACKEND_ENV_FILE:-../../backend/.env}
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      ENVIRONMENT: raspberry_docker
      HTTP_PROXY: ${HTTP_PROXY-}
      HTTPS_PROXY: ${HTTPS_PROXY-}
      NO_PROXY: ${NO_PROXY-}
      http_proxy: ${HTTP_PROXY-}
      https_proxy: ${HTTPS_PROXY-}
      no_proxy: ${NO_PROXY-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    expose:
      - "8001"
    command: daphne -b 0.0.0.0 -p 8001 kor35.asgi:application
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/healthz/').read()\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s

  pilot_tick:
    build:
      context: ../../backend
    restart: unless-stopped
    env_file:
      - ${KOR35_BACKEND_ENV_FILE:-../../backend/.env}
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      ENVIRONMENT: raspberry_docker
      HTTP_PROXY: ${HTTP_PROXY-}
      HTTPS_PROXY: ${HTTPS_PROXY-}
      NO_PROXY: ${NO_PROXY-}
      http_proxy: ${HTTP_PROXY-}
      https_proxy: ${HTTPS_PROXY-}
      no_proxy: ${NO_PROXY-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: python manage.py pilot_tick --loop --interval 5

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      daphne:
        condition: service_healthy
