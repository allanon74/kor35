# --- TLS obbligatorio in produzione (cookie sicuri, PWA, API) ---
# Server Docker di produzione (DigitalOcean): solo domini pubblici.
# Il dominio DDNS (Raspberry / mirror) non è qui: vedi ddns.conf.example sul Pi.
#
# Prima del primo avvio di `frontend`, copia i certificati sul host in:
#   config/docker/nginx-docker/certs/fullchain.pem
#   config/docker/nginx-docker/certs/privkey.pem
#
# Dal vecchio server (tipico Let's Encrypt), adattando il path live/<dominio>/:
#   scp user@vecchio:/etc/letsencrypt/live/.../fullchain.pem ./certs/
#   scp user@vecchio:/etc/letsencrypt/live/.../privkey.pem ./certs/

# HTTP → HTTPS (domini pubblici)
server {
    listen 80;
    server_name www.kor35.it www.k-o-r-35.it;
    return 301 https://$host$request_uri;
}

# Solo diagnostica locale (senza TLS); i client usano HTTPS sui domini sopra.
server {
    listen 80 default_server;
    server_name localhost 127.0.0.1;

    include /etc/nginx/conf.d/common_locations.snippets;
}

# HTTPS: domini di produzione
server {
    listen 443 ssl;
    server_name www.kor35.it www.k-o-r-35.it;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    include /etc/nginx/conf.d/ssl_params.snippets;
    include /etc/nginx/conf.d/common_locations.snippets;
}
